<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DES Tools</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <strong class="brand">DES Tools</strong>
      <nav id="tool-nav"></nav>
    </aside>

    <div class="shell-main">
      <header>
        <span id="page-title">Dashboard</span>

        <div id="auth-area">
          <button id="signin-btn" class="btn-ghost">
            <svg class="icon" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
            Sign In
          </button>

          <div id="user-menu" class="user-menu" hidden>
            <button id="user-menu-btn" class="btn-ghost">
              <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
              <span id="user-display-name"></span>
              <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
            </button>

            <div id="user-dropdown" class="dropdown" hidden>
              <button id="profile-btn" class="dropdown-item">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
                Profile Settings
              </button>

              <div class="dropdown-section-label">Theme</div>
              <button class="dropdown-item theme-choice" data-theme-mode="light">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
                Light
              </button>
              <button class="dropdown-item theme-choice" data-theme-mode="dark">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
                Dark
              </button>
              <button class="dropdown-item theme-choice" data-theme-mode="system">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                System
              </button>

              <hr>
              <button id="logout-btn" class="dropdown-item">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                Log Out
              </button>
            </div>
          </div>
        </div>
      </header>

      <main id="content"></main>
    </div>
  </div>

  <dialog id="auth-modal">
    <button id="auth-modal-close" class="dialog-close" aria-label="Close">&times;</button>

    <form id="login-form">
      <h2>Sign In</h2>
      <input name="email" type="email" placeholder="Email Address" required autocomplete="username">
      <input name="password" type="password" placeholder="Password" required minlength="8" autocomplete="current-password">
      <button type="submit" class="btn-primary">Sign In</button>
      <p class="dialog-msg" id="login-msg"></p>
      <p class="dialog-switch">Need an account? <a href="#" id="show-register">Create one</a></p>
    </form>

    <form id="register-form" hidden>
      <h2>Create Account</h2>
      <input name="displayName" type="text" placeholder="Preferred name" required autocomplete="nickname">
      <input name="email" type="email" placeholder="Email Address" required autocomplete="username">
      <input name="password" type="password" placeholder="Password (8+ characters)" required minlength="8" autocomplete="new-password">
      <button type="submit" class="btn-primary">Create Account</button>
      <p class="dialog-msg" id="register-msg"></p>
      <p class="dialog-switch">Already have an account? <a href="#" id="show-login">Sign in</a></p>
    </form>
  </dialog>

  <dialog id="profile-modal">
    <button id="profile-modal-close" class="dialog-close" aria-label="Close">&times;</button>
    <form id="profile-form">
      <h2>Profile Settings</h2>
      <label for="profile-display-name">Preferred name</label>
      <input id="profile-display-name" name="displayName" type="text" required>
      <button type="submit" class="btn-primary">Save</button>
      <p class="dialog-msg" id="profile-msg"></p>
    </form>
  </dialog>

  <script src="assets/app.js"></script>
</body>
</html>
